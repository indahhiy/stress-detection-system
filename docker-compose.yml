services:
  mysql:
    image: mysql:8.0
    container_name: stress_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: stress_detection_db
      MYSQL_USER: stress_user
      MYSQL_PASSWORD: stress_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
